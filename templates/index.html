<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadient AI Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary-color: #4f46e5;
            --bg-color: #f9fafb;
            --chat-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --bot-bubble: #f3f4f6;
            --user-bubble: #4f46e5;
            --user-text: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #chat-container {
            width: 100%;
            max-width: 600px;
            height: 80vh;
            background: var(--chat-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin: 20px;
        }

        header {
            padding: 20px;
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            text-align: center;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary-color);
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bot-message {
            align-self: flex-start;
            background-color: var(--bot-bubble);
            color: var(--text-main);
            border-bottom-left-radius: 2px;
        }

        /* Markdown Styling for Bot Messages */
        .bot-message h1, .bot-message h2, .bot-message h3 {
            margin: 12px 0 8px 0;
            font-weight: 600;
            line-height: 1.2;
        }
        .bot-message h1 { font-size: 1.2rem; }
        .bot-message h2 { font-size: 1.1rem; }
        .bot-message h3 { font-size: 1rem; }
        
        .bot-message p {
            margin-bottom: 8px;
        }
        .bot-message p:last-child {
            margin-bottom: 0;
        }
        
        .bot-message ul, .bot-message ol {
            margin-left: 20px;
            margin-bottom: 8px;
        }
        
        .bot-message li {
            margin-bottom: 4px;
        }
        
        .bot-message code {
            background-color: rgba(0,0,0,0.05);
            padding: 2px 4px;
            border-radius: 4px;
            font-family: monospace;
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--user-bubble);
            color: var(--user-text);
            border-bottom-right-radius: 2px;
            white-space: pre-wrap;
        }

        #input-area {
            padding: 20px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary-color);
        }

        button {
            padding: 10px 20px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }

        /* Loading indicator */
        .typing {
            font-style: italic;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 4px;
            margin-left: 5px;
        }
    </style>
</head>
<body>

<div id="chat-container">
    <header>
        <h1>Cadient Assistant</h1>
    </header>
    
    <div id="chat-window">
        <div class="message bot-message">Hello! How can I help you today?</div>
    </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off">
        <button id="send-btn">Send</button>
    </div>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    // Configure marked to handle line breaks as <br>
    marked.setOptions({
        breaks: true,
        gfm: true
    });

    function addMessage(text, isUser) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message');
        msgDiv.classList.add(isUser ? 'user-message' : 'bot-message');
        
        if (isUser) {
            msgDiv.innerText = text;
        } else {
            // Use marked to parse markdown content safely
            msgDiv.innerHTML = marked.parse(text);
        }
        
        chatWindow.appendChild(msgDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    async function sendMessage() {
        const message = userInput.value.trim();
        if (!message) return;

        addMessage(message, true);
        userInput.value = '';
        userInput.disabled = true;
        sendBtn.disabled = true;

        // Show typing indicator
        const typingIndicator = document.createElement('div');
        typingIndicator.className = 'typing';
        typingIndicator.innerText = 'Assistant is thinking...';
        chatWindow.appendChild(typingIndicator);
        chatWindow.scrollTop = chatWindow.scrollHeight;

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });
            const data = await response.json();
            
            chatWindow.removeChild(typingIndicator);
            addMessage(data.response, false);
        } catch (error) {
            if (chatWindow.contains(typingIndicator)) {
                chatWindow.removeChild(typingIndicator);
            }
            addMessage("Sorry, something went wrong. Please try again.", false);
        } finally {
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>

</body>
</html>
